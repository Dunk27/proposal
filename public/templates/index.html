<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шаблоны КП по отраслям — ProposeAI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--cream:#F5F0E8;--white:#FDFAF5;--ink:#1A1612;--ink2:#3D3530;--ink3:#7A6F66;--accent:#B8922A;--apal:rgba(184,146,42,0.1);--aline:rgba(184,146,42,0.25);}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
.hdr{padding:16px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--aline);background:rgba(245,240,232,.94);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;text-decoration:none;color:var(--ink);}
.logo strong{font-weight:600;color:var(--accent);}
.btn{padding:8px 18px;border-radius:3px;font-size:12px;font-weight:600;letter-spacing:.5px;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;transition:all .2s;text-decoration:none;display:inline-block;}
.btn.sol{background:var(--ink);color:var(--cream);}.btn.sol:hover{background:var(--accent);}
.btn.out{background:transparent;border:1px solid var(--aline);color:var(--ink2);}.btn.out:hover{border-color:var(--accent);color:var(--accent);}
.wrap{max-width:1060px;margin:0 auto;padding:40px 24px 80px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;margin-bottom:6px;}
.page-sub{font-size:13px;color:var(--ink3);margin-bottom:32px;line-height:1.6;}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;}
.fb{padding:6px 14px;border:1px solid var(--aline);border-radius:99px;font-size:12px;font-weight:500;color:var(--ink3);cursor:pointer;transition:all .2s;background:var(--white);}
.fb:hover,.fb.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.card{background:var(--white);border:1px solid var(--aline);border-radius:8px;padding:20px;cursor:pointer;transition:all .2s;}
.card:hover{border-color:var(--accent);transform:translateY(-2px);}
.ci{font-size:28px;margin-bottom:12px;}
.ct{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px;}
.cd{font-size:11px;color:var(--ink3);margin-bottom:10px;}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.tag{padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;background:var(--apal);color:var(--accent);border:1px solid var(--aline);}
.cp{font-size:12px;color:var(--ink3);line-height:1.5;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.ub{width:100%;padding:10px;background:var(--ink);color:var(--cream);border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.ub:hover{background:var(--accent);}
@media(max-width:768px){.grid{grid-template-columns:1fr 1fr;}.hdr{padding:14px 16px;}.wrap{padding:24px 16px;}}
@media(max-width:480px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header class="hdr">
  <a href="/app" class="logo">Propose<strong>AI</strong></a>
  <div style="display:flex;gap:8px;">
    <a href="/dashboard" class="btn out">История</a>
    <a href="/app" class="btn sol">+ Новое КП</a>
  </div>
</header>
<div class="wrap">
  <div class="page-title">Шаблоны по отраслям</div>
  <div class="page-sub">12 готовых шаблонов — поля формы заполняются автоматически.<br>Останется указать данные клиента и нажать «Сгенерировать».</div>
  <div class="filters" id="filters">
    <button class="fb active" onclick="filterBy('all')" data-tag="all">Все шаблоны</button>
  </div>
  <div class="grid" id="grid"></div>
</div>
<script>
const T=[
  {id:'it-crm',icon:'💻',title:'CRM/ERP разработка',industry:'IT / Разработка ПО',tags:['IT','Разработка'],coServices:'Разработка CRM и ERP систем на заказ. Интеграция с 1С, Bitrix24, amoCRM. Мобильные приложения. Техническая поддержка.',coUsp:'10+ лет, 200+ проектов, 40 разработчиков, гарантия 12 мес, поддержка 24/7',clientNeed:'Клиент ведёт учёт в Excel и теряет сделки. Нет единой базы и аналитики.',tone:'consultative'},
  {id:'marketing',icon:'📣',title:'Маркетинговое агентство',industry:'Маркетинг / Реклама',tags:['Маркетинг','Реклама'],coServices:'Контекстная реклама Яндекс.Директ и Google Ads. Таргет ВКонтакте и Telegram. SEO, контент-маркетинг, SMM.',coUsp:'Сертифицированные специалисты, средний ROAS 450%, KPI-гарантии в договоре',clientNeed:'Тратит бюджет на рекламу без отдачи. Заявки дорогие и нецелевые.',tone:'bold'},
  {id:'construction',icon:'🏗️',title:'Строительство и ремонт',industry:'Строительство',tags:['Строительство','Ремонт'],coServices:'Строительство коммерческих объектов под ключ. Ремонт офисов. Проектирование и авторский надзор.',coUsp:'15 лет, допуск СРО, 120+ объектов, гарантия 5 лет, 98% соблюдения сроков',clientNeed:'Ремонт офиса 500 кв.м. в сжатые сроки без простоя. Нужен чёткий бюджет.',tone:'formal'},
  {id:'hr',icon:'👥',title:'HR-консалтинг и подбор',industry:'HR / Персонал',tags:['HR','Консалтинг'],coServices:'Подбор руководителей и специалистов. HR-аудит и консалтинг. Система мотивации и KPI.',coUsp:'Закрытие за 21 день, гарантийная замена 90 дней, база 50 000+ кандидатов',clientNeed:'15 открытых вакансий, внутренний HR не справляется.',tone:'warm'},
  {id:'logistics',icon:'🚚',title:'Логистика и доставка',industry:'Логистика',tags:['Логистика','Транспорт'],coServices:'Грузовые перевозки по России и СНГ. Таможенное оформление. Склады и фулфилмент.',coUsp:'8 лет, 200+ единиц автопарка, склады в 12 городах, SLA 99.2%',clientNeed:'Срывы сроков, потери грузов, недовольные клиенты.',tone:'consultative'},
  {id:'legal',icon:'⚖️',title:'Юридические услуги',industry:'Юриспруденция',tags:['Юридические','Право'],coServices:'Корпоративное право и M&A. Налоговый консалтинг. Защита ИС. Арбитражные споры.',coUsp:'20 лет, 30 специалистов, 95% выигранных дел',clientNeed:'Налоговые претензии на 15 млн рублей. Нужна срочная защита.',tone:'formal'},
  {id:'saas',icon:'☁️',title:'SaaS / IT-решение',industry:'SaaS / IT',tags:['SaaS','IT','ПО'],coServices:'Облачная платформа для автоматизации бизнес-процессов. Интеграции с 1С, Bitrix, Telegram. API.',coUsp:'Внедрение за 1 день, триал 14 дней, SLA 99.9%, данные в России',clientNeed:'Команда 50+ тратит часы на ручные задачи.',tone:'bold'},
  {id:'accounting',icon:'📊',title:'Бухгалтерия и финансы',industry:'Бухгалтерия',tags:['Бухгалтерия','Аутсорсинг'],coServices:'Бухгалтерский и налоговый учёт. Расчёт зарплаты. Восстановление учёта.',coUsp:'Штрафы берём на себя по договору, 25 аттестованных бухгалтеров',clientNeed:'ИП стал ООО, документооборот вырос в 5 раз. Боятся штрафов.',tone:'warm'},
  {id:'education',icon:'🎓',title:'Обучение и EdTech',industry:'Образование',tags:['Обучение','EdTech'],coServices:'Корпоративное обучение. Разработка онлайн-курсов и LMS. Коучинг руководителей.',coUsp:'NPS 87%, 500+ курсов, трудоустройство 94%',clientNeed:'Нужно обучить 100 сотрудников. Стандартные тренинги не работают.',tone:'consultative'},
  {id:'realty',icon:'🏢',title:'Коммерческая недвижимость',industry:'Недвижимость',tags:['Недвижимость','Аренда'],coServices:'Аренда и продажа коммерческой недвижимости. Управление объектами. Брокерские услуги.',coUsp:'200 000 кв.м. в портфеле, юридическое сопровождение включено, 48ч до просмотров',clientNeed:'Ищут офис 300 кв.м. с паркингом. Предыдущий брокер тратил месяцы.',tone:'formal'},
  {id:'security',icon:'🔒',title:'Информационная безопасность',industry:'ИБ / Кибербезопасность',tags:['ИБ','Безопасность'],coServices:'Аудит ИБ. Пентестирование. Внедрение DLP и SIEM. Соответствие 152-ФЗ.',coUsp:'Лицензии ФСТЭК и ФСБ, 15 лет, работаем с банками и госструктурами',clientNeed:'Утечка данных клиентов. Нужно оценить инцидент и выстроить защиту.',tone:'formal'},
  {id:'design',icon:'🎨',title:'Дизайн и брендинг',industry:'Дизайн / Брендинг',tags:['Дизайн','Брендинг'],coServices:'Разработка фирменного стиля и брендбука. UI/UX дизайн. Маркетинговые материалы.',coUsp:'300+ проектов, награды Red Dot и IF Design, 20 дизайнеров',clientNeed:'Выход на новый рынок, нужен ребрендинг: логотип, фирменный стиль.',tone:'warm'},
]

const allTags=[...new Set(T.flatMap(t=>t.tags))].sort()
const filtersEl=document.getElementById('filters')
allTags.forEach(tag=>{
  const btn=document.createElement('button')
  btn.className='fb';btn.dataset.tag=tag;btn.textContent=tag
  btn.onclick=()=>filterBy(tag);filtersEl.appendChild(btn)
})

let active='all'
function filterBy(tag){
  active=tag
  document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('active',b.dataset.tag===tag))
  render()
}
function render(){
  const list=active==='all'?T:T.filter(t=>t.tags.includes(active))
  document.getElementById('grid').innerHTML=list.map(t=>`
    <div class="card" onclick="use('${t.id}')">
      <div class="ci">${t.icon}</div>
      <div class="ct">${t.title}</div>
      <div class="cd">${t.industry}</div>
      <div class="tags">${t.tags.map(g=>`<span class="tag">${g}</span>`).join('')}</div>
      <div class="cp">${t.coServices}</div>
      <button class="ub">Использовать шаблон →</button>
    </div>`).join('')
}
function use(id){
  const t=T.find(x=>x.id===id);if(!t)return
  localStorage.setItem('kp_template',JSON.stringify(t))
  window.location.href='/app?template='+id
}
render()
const ref=new URLSearchParams(location.search).get('ref')
if(ref)localStorage.setItem('kp_ref_code',ref)
</script>
</body>
</html>
