<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тарифы — ProposeAI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--cream:#F4F7FD;--cream2:#E8EEF9;--cream3:#D6E3F5;--white:#FAFCFF;--ink:#111827;--ink2:#374151;--ink3:#6B7280;--accent:#3D6FBF;--accent2:#5584CC;--apal:rgba(61,111,191,0.1);--aline:rgba(61,111,191,0.25);--green:#2A4F8F;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);}
nav{padding:16px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--aline);background:rgba(245,240,232,.94);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;text-decoration:none;color:var(--ink);}
.logo strong{font-weight:600;color:var(--accent);}
.nav-r{display:flex;gap:8px;}
.btn{padding:9px 20px;border-radius:3px;font-size:12px;font-weight:600;letter-spacing:.5px;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;transition:all .2s;text-decoration:none;display:inline-block;}
.btn.out{background:transparent;border:1px solid var(--aline);color:var(--ink2);}
.btn.out:hover{border-color:var(--accent);color:var(--accent);}
.btn.sol{background:var(--ink);color:var(--cream);}
.btn.sol:hover{background:var(--accent);}
.btn.acc{background:var(--accent);color:#fff;}
.btn.acc:hover{opacity:.9;}
.hero{text-align:center;padding:64px 24px 48px;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(34px,5vw,52px);font-weight:300;color:var(--ink);margin-bottom:12px;}
.hero-title em{font-style:italic;color:var(--accent);}
.hero-sub{font-size:14px;color:var(--ink3);max-width:440px;margin:0 auto 32px;line-height:1.7;}

/* TOGGLE */
.toggle-wrap{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:48px;}
.toggle-label{font-size:13px;font-weight:500;color:var(--ink3);}
.toggle-label.active{color:var(--ink);}
.toggle-pill{width:48px;height:26px;border-radius:13px;background:var(--accent);cursor:pointer;position:relative;transition:background .2s;border:none;}
.toggle-thumb{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:transform .2s;}
.toggle-pill.monthly .toggle-thumb{transform:translateX(0);}
.toggle-pill.annual .toggle-thumb{transform:translateX(22px);}
.save-badge{background:rgba(39,105,92,.15);color:var(--green);font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;border:1px solid rgba(39,105,92,.25);}

/* PRICING */
.pricing-wrap{max-width:1000px;margin:0 auto;padding:0 24px 80px;}
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:48px;}
.price-card{background:var(--white);border:1px solid var(--aline);border-radius:10px;padding:28px 24px;transition:border-color .2s;position:relative;}
.price-card:hover{border-color:var(--accent);}
.price-card.popular{border:2px solid var(--accent);}
.popular-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:3px 14px;border-radius:99px;letter-spacing:.5px;white-space:nowrap;}
.pc-name{font-size:13px;font-weight:700;color:var(--ink2);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;}
.pc-price{display:flex;align-items:baseline;gap:4px;margin-bottom:6px;}
.pc-amount{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;color:var(--ink);}
.pc-old{font-size:16px;color:var(--ink3);text-decoration:line-through;margin-left:6px;}
.pc-period{font-size:13px;color:var(--ink3);}
.pc-subprice{font-size:12px;color:var(--ink3);margin-bottom:18px;min-height:16px;}
.pc-subprice strong{color:var(--green);}
.pc-divider{height:1px;background:var(--cream3);margin-bottom:18px;}
.pc-features{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.pc-features li{font-size:13px;color:var(--ink2);display:flex;align-items:flex-start;gap:8px;line-height:1.4;}
.pc-features li::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0;margin-top:1px;}
.pc-features li.no::before{content:'–';color:var(--ink3);}
.pc-features li.no{color:var(--ink3);}
.pc-btn{width:100%;padding:13px;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;border:none;transition:all .2s;text-decoration:none;display:block;text-align:center;}
.pc-btn.sol{background:var(--ink);color:var(--cream);}
.pc-btn.sol:hover{background:var(--accent);}
.pc-btn.acc{background:var(--accent);color:#fff;}
.pc-btn.acc:hover{opacity:.9;}
.pc-btn.out{background:transparent;border:1px solid var(--aline);color:var(--ink2);}
.pc-btn.out:hover{border-color:var(--accent);color:var(--accent);}

/* COMPARISON TABLE */
.compare-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;text-align:center;margin-bottom:24px;}
.compare-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{padding:12px 16px;text-align:left;border-bottom:2px solid var(--ink);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);}
thead th:first-child{text-align:left;}
thead th:not(:first-child){text-align:center;}
tbody tr:nth-child(even){background:var(--white);}
tbody td{padding:11px 16px;border-bottom:1px solid var(--cream3);}
tbody td:not(:first-child){text-align:center;}
.td-yes{color:var(--green);font-weight:700;}
.td-no{color:var(--ink3);}
.td-cat{font-weight:600;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);background:var(--cream) !important;padding-top:18px !important;}
@media(max-width:700px){.pricing-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo"><img src="logo.png" alt="Logo" style="height:32px;width:auto;vertical-align:middle;margin-right:6px;">Propose<strong>AI</strong></a>
  <div class="nav-r">
    <a href="/auth/login" class="btn out">Войти</a>
    <a href="/auth/login" class="btn sol">Попробовать бесплатно</a>
  </div>
</nav>

<div class="hero">
  <h1 class="hero-title">Простые честные цены<br>для <em>любого бюджета</em></h1>
  <div class="hero-sub">14 дней бесплатного Pro-доступа. Без карты при регистрации. Отмена в любой момент.</div>

  <div class="toggle-wrap">
    <span class="toggle-label active" id="lbl-monthly">Ежемесячно</span>
    <button class="toggle-pill monthly" id="period-toggle" onclick="togglePeriod()">
      <div class="toggle-thumb"></div>
    </button>
    <span class="toggle-label" id="lbl-annual">Годовой</span>
    <span class="save-badge" id="save-badge" style="display:none;">Экономия 20%</span>
  </div>
</div>

<div class="pricing-wrap">
  <div class="pricing-grid" id="pricing-grid"></div>

  <div class="compare-title">Полное сравнение тарифов</div>
  <div class="compare-wrap">
    <table id="compare-table">
      <thead>
        <tr>
          <th style="width:40%">Функция</th>
          <th>Free</th>
          <th>Starter</th>
          <th style="color:var(--accent)">Pro</th>
          <th>Agency</th>
        </tr>
      </thead>
      <tbody id="compare-body"></tbody>
    </table>
  </div>
</div>

<script>
let period = 'monthly'

const PLANS = {
  monthly: [
    { name:'Free',    amount:0,     period:'/мес', subprice:'Бесплатно навсегда', popular:false, btn:'out', btnText:'Начать бесплатно', planId:'free_monthly',
      features:['3 КП в месяц','Claude Haiku',{text:'Экспорт TXT',no:false},{text:'GPT-4o / Gemini',no:true},{text:'DOCX экспорт',no:true}] },
    { name:'Starter', amount:990,   period:'/мес', subprice:'', popular:false, btn:'sol', btnText:'Начать', planId:'starter_monthly',
      features:['20 КП в месяц','Llama 3.3 · Gemini Flash · Mistral','Экспорт TXT','История КП',{text:'GPT-4o',no:true},{text:'DOCX + PDF',no:true}] },
    { name:'Pro',     amount:2990,  period:'/мес', subprice:'', popular:true,  btn:'acc', btnText:'Попробовать 14 дней бесплатно', planId:'pro_monthly',
      features:['Безлимит КП','Все 6 ИИ-моделей','Экспорт DOCX + PDF','История КП','Автовыбор модели','Приоритетная поддержка'] },
    { name:'Agency',  amount:7900,  period:'/мес', subprice:'', popular:false, btn:'sol', btnText:'Связаться', planId:'agency_monthly',
      features:['Всё из Pro','White-label брендинг','API-доступ','Безлимит команда','Выделенная поддержка','Персональный менеджер'] },
  ],
  annual: [
    { name:'Free',    amount:0,     period:'/год',  subprice:'Бесплатно навсегда', popular:false, btn:'out', btnText:'Начать бесплатно', planId:'free_annual',
      features:['3 КП в месяц','Claude Haiku',{text:'Экспорт TXT',no:false},{text:'GPT-4o / Gemini',no:true},{text:'DOCX экспорт',no:true}] },
    { name:'Starter', amount:9504,  period:'/год',  subprice:'<strong>792 ₽/мес</strong> — экономия 1 584 ₽', popular:false, btn:'sol', btnText:'Начать', planId:'starter_annual',
      features:['20 КП в месяц','Llama 3.3 · Gemini Flash · Mistral','Экспорт TXT','История КП',{text:'GPT-4o',no:true},{text:'DOCX + PDF',no:true}] },
    { name:'Pro',     amount:28704, period:'/год',  subprice:'<strong>2 392 ₽/мес</strong> — экономия 7 176 ₽', popular:true,  btn:'acc', btnText:'Попробовать 14 дней бесплатно', planId:'pro_annual',
      features:['Безлимит КП','Все 6 ИИ-моделей','Экспорт DOCX + PDF','История КП','Автовыбор модели','Приоритетная поддержка'] },
    { name:'Agency',  amount:75840, period:'/год',  subprice:'<strong>6 320 ₽/мес</strong> — экономия 18 960 ₽', popular:false, btn:'sol', btnText:'Связаться', planId:'agency_annual',
      features:['Всё из Pro','White-label брендинг','API-доступ','Безлимит команда','Выделенная поддержка','Персональный менеджер'] },
  ],
}

const COMPARE_ROWS = [
  { cat:'Генерация' },
  { label:'КП в месяц',           vals:['3','20','∞','∞'] },
  { label:'ИИ-модели',            vals:['1 (Haiku)','2','6','6'] },
  { label:'Автовыбор модели',      vals:['—','—','✓','✓'] },
  { label:'Длина КП',             vals:['Кратко','Всё','Всё','Всё'] },
  { cat:'Экспорт' },
  { label:'Скачать TXT',          vals:['✓','✓','✓','✓'] },
  { label:'Экспорт DOCX',         vals:['—','—','✓','✓'] },
  { label:'Экспорт PDF',          vals:['—','—','✓','✓'] },
  { label:'Брендированный PDF',   vals:['—','—','—','✓'] },
  { cat:'Данные и история' },
  { label:'История КП',           vals:['—','✓','✓','✓'] },
  { label:'Профиль компании',     vals:['✓','✓','✓','✓'] },
  { label:'Шаблоны КП',           vals:['✓','✓','✓','✓'] },
  { label:'Загрузка файлов',      vals:['✓','✓','✓','✓'] },
  { cat:'Кэш и оптимизация' },
  { label:'Кэш ИИ-ответов',       vals:['✓','✓','✓','✓'] },
  { label:'Реферальная программа',vals:['✓','✓','✓','✓'] },
  { cat:'Дополнительно' },
  { label:'API-доступ',           vals:['—','—','—','✓'] },
  { label:'White-label',          vals:['—','—','—','✓'] },
  { label:'Поддержка',            vals:['Email','Email','Приоритет','Персональный'] },
]

function togglePeriod() {
  period = period === 'monthly' ? 'annual' : 'monthly'
  const tog = document.getElementById('period-toggle')
  tog.className = 'toggle-pill ' + period
  document.getElementById('lbl-monthly').className = 'toggle-label' + (period === 'monthly' ? ' active' : '')
  document.getElementById('lbl-annual').className  = 'toggle-label' + (period === 'annual'  ? ' active' : '')
  document.getElementById('save-badge').style.display = period === 'annual' ? 'inline-block' : 'none'
  renderPricing()
}

function renderPricing() {
  const plans = PLANS[period]
  const g = document.getElementById('pricing-grid')
  const monthlyAmounts = PLANS.monthly.map(p => p.amount)
  g.innerHTML = plans.map((p, i) => {
    const oldAmount = period === 'annual' && i > 0 ? monthlyAmounts[i] * 12 : null
    const feats = p.features.map(f => {
      const isNo = typeof f === 'object' && f.no
      const text = typeof f === 'object' ? f.text : f
      return `<li ${isNo ? 'class="no"' : ''}>${text}</li>`
    }).join('')
    return `
    <div class="price-card ${p.popular ? 'popular' : ''}">
      ${p.popular ? '<div class="popular-badge">Популярный</div>' : ''}
      <div class="pc-name">${p.name}</div>
      <div class="pc-price">
        <span class="pc-amount">${p.amount > 0 ? p.amount.toLocaleString('ru') + ' ₽' : '0 ₽'}</span>
        ${oldAmount ? `<span class="pc-old">${(oldAmount).toLocaleString('ru')} ₽</span>` : ''}
        <span class="pc-period">${p.period}</span>
      </div>
      <div class="pc-subprice">${p.subprice || '&nbsp;'}</div>
      <div class="pc-divider"></div>
      <ul class="pc-features">${feats}</ul>
      <a href="/auth/login?plan=${p.planId}" class="pc-btn ${p.btn}">${p.btnText}</a>
    </div>`
  }).join('')
}

function renderCompare() {
  const b = document.getElementById('compare-body')
  b.innerHTML = COMPARE_ROWS.map(r => {
    if (r.cat) return `<tr><td class="td-cat" colspan="5">${r.cat}</td></tr>`
    return `<tr>
      <td>${r.label}</td>
      ${r.vals.map(v => `<td class="${v==='✓'?'td-yes':v==='—'?'td-no':''}">${v}</td>`).join('')}
    </tr>`
  }).join('')
}

renderPricing()
renderCompare()
</script>
</body>
</html>
