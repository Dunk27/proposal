<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — ProposeAI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--cream:#F4F7FD;--white:#FAFCFF;--ink:#111827;--ink2:#374151;--ink3:#6B7280;--accent:#3D6FBF;--apal:rgba(61,111,191,0.1);--aline:rgba(61,111,191,0.25);--red:#C0392B;--bg3:#D6E3F5;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.card{background:var(--white);border:1px solid var(--aline);border-radius:12px;padding:40px;width:100%;max-width:420px;}
.logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;text-align:center;margin-bottom:8px;color:var(--ink);}
.logo strong{font-weight:600;color:var(--accent);}
.subtitle{text-align:center;font-size:13px;color:var(--ink3);margin-bottom:32px;}
.tabs{display:flex;border-bottom:1px solid var(--aline);margin-bottom:24px;}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.field{margin-bottom:16px;}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.field input{width:100%;background:var(--cream);border:1px solid var(--bg3);border-radius:4px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--apal);}
.btn{width:100%;padding:13px;background:var(--ink);color:var(--cream);border:none;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn:hover{background:var(--accent);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.msg{padding:10px 14px;border-radius:4px;font-size:13px;margin-bottom:16px;display:none;}
.msg.err{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);color:var(--red);}
.msg.ok{background:rgba(39,105,92,.08);border:1px solid rgba(39,105,92,.2);color:#2A4F8F;}
.forgot{text-align:right;font-size:12px;color:var(--ink3);cursor:pointer;margin-top:8px;}
.forgot:hover{color:var(--accent);}
.divider{text-align:center;font-size:12px;color:var(--ink3);margin:20px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--aline);}
.divider::before{left:0;}.divider::after{right:0;}
.trial-note{background:var(--apal);border:1px solid var(--aline);border-radius:6px;padding:12px 14px;font-size:12px;color:var(--ink2);text-align:center;margin-top:16px;line-height:1.5;}
.trial-note strong{color:var(--accent);}
.tab-content{display:none;}.tab-content.active{display:block;}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><img src="../logo.png" alt="Logo" style="height:32px;width:auto;vertical-align:middle;margin-right:6px;">Propose<strong>AI</strong></div>
  <div class="subtitle">Генератор коммерческих предложений на базе ИИ</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Вход</div>
    <div class="tab" onclick="switchTab('register')">Регистрация</div>
  </div>

  <div id="msg" class="msg"></div>

  <div id="login-tab" class="tab-content active">
    <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="you@company.ru" autocomplete="email"></div>
    <div class="field"><label>Пароль</label><input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <div class="forgot" onclick="switchTab('reset')">Забыли пароль?</div>
    <button class="btn" id="l-btn" onclick="login()">Войти</button>
  </div>

  <div id="register-tab" class="tab-content">
    <div class="field"><label>Email</label><input type="email" id="r-email" placeholder="you@company.ru" autocomplete="email"></div>
    <div class="field"><label>Пароль (минимум 8 символов)</label><input type="password" id="r-pass" placeholder="••••••••" autocomplete="new-password"></div>
    <button class="btn" id="r-btn" onclick="register()">Создать аккаунт</button>
    <div class="trial-note"><strong>14 дней бесплатно</strong> — без карты. Полный доступ к Pro-функциям.</div>
  </div>

  <div id="reset-tab" class="tab-content">
    <div class="field"><label>Email</label><input type="email" id="rst-email" placeholder="you@company.ru"></div>
    <button class="btn" id="rst-btn" onclick="resetPassword()">Отправить письмо для сброса</button>
    <div class="forgot" onclick="switchTab('login')">← Назад к входу</div>
  </div>
</div>

<script>
function showMsg(text, type='err'){
  const el=document.getElementById('msg');
  el.textContent=text;el.className='msg '+type;el.style.display='block';
  if(type==='ok') setTimeout(()=>el.style.display='none',4000);
}
function hideMsg(){document.getElementById('msg').style.display='none';}

function switchTab(t){
  hideMsg();
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['login','register','reset'][i]===t));
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById(t+'-tab')?.classList.add('active')||(t==='reset'&&document.getElementById('reset-tab').classList.add('active'));
}

async function login(){
  const email=document.getElementById('l-email').value.trim();
  const password=document.getElementById('l-pass').value;
  if(!email||!password){showMsg('Заполните все поля');return;}
  const btn=document.getElementById('l-btn');
  btn.disabled=true;btn.textContent='Входим…';
  try{
    const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'login',email,password})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Ошибка входа');
    localStorage.setItem('sb-token',d.access_token);
    localStorage.setItem('sb-refresh',d.refresh_token);
    localStorage.setItem('sb-user',JSON.stringify(d.user));
    window.location.href='/app';
  }catch(e){showMsg(e.message);}
  finally{btn.disabled=false;btn.textContent='Войти';}
}

async function register(){
  const email=document.getElementById('r-email').value.trim();
  const password=document.getElementById('r-pass').value;
  if(!email||!password){showMsg('Заполните все поля');return;}
  if(password.length<8){showMsg('Пароль должен быть минимум 8 символов');return;}
  const btn=document.getElementById('r-btn');
  btn.disabled=true;btn.textContent='Создаём аккаунт…';
  try{
    const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'register',email,password})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Ошибка регистрации');
    showMsg('Проверьте почту — отправили письмо для подтверждения','ok');
    setTimeout(()=>switchTab('login'),3000);
  }catch(e){showMsg(e.message);}
  finally{btn.disabled=false;btn.textContent='Создать аккаунт';}
}

async function resetPassword(){
  const email=document.getElementById('rst-email').value.trim();
  if(!email){showMsg('Введите email');return;}
  const btn=document.getElementById('rst-btn');
  btn.disabled=true;btn.textContent='Отправляем…';
  try{
    const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'reset',email})});
    showMsg('Письмо отправлено — проверьте почту','ok');
  }catch(e){showMsg(e.message);}
  finally{btn.disabled=false;btn.textContent='Отправить письмо для сброса';}
}

document.getElementById('l-pass').addEventListener('keydown',e=>e.key==='Enter'&&login());
document.getElementById('r-pass').addEventListener('keydown',e=>e.key==='Enter'&&register());

// Если уже залогинен — на /app
if(localStorage.getItem('sb-token'))window.location.href='/app';
</script>
</body>
</html>
