<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — ProposeAI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0F172A;--surface:#1E293B;--border:rgba(255,255,255,.08);--ink:#F1F5F9;--ink2:#CBD5E1;--ink3:#64748B;--accent:#5584CC;--green:#34D399;--red:#F87171;--blue:#60A5FA;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.hdr{padding:14px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:16px;font-weight:600;color:var(--accent);}
.auth-gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 48px);gap:12px;}
.auth-gate input{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 16px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;width:280px;outline:none;}
.auth-gate input:focus{border-color:var(--accent);}
.auth-gate button{padding:11px 28px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;width:280px;}
.main{display:none;padding:28px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;}
.stat-n{font-size:26px;font-weight:600;color:var(--ink);margin-bottom:4px;}
.stat-l{font-size:11px;color:var(--ink3);letter-spacing:.5px;}
.stat-n.green{color:var(--green);}
.section-title{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:12px;}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:28px;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);border-bottom:1px solid var(--border);}
td{padding:11px 16px;font-size:12px;color:var(--ink2);border-bottom:1px solid rgba(255,255,255,.04);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.03);}
.badge{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;}
.badge.trial{background:rgba(212,171,66,.15);color:var(--accent);}
.badge.pro{background:rgba(52,211,153,.15);color:var(--green);}
.badge.free{background:rgba(100,116,139,.15);color:var(--ink3);}
.badge.starter{background:rgba(96,165,250,.15);color:var(--blue);}
.invite-form{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:28px;}
.invite-row{display:flex;gap:10px;align-items:flex-end;}
.invite-row input,.invite-row select{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 13px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.invite-row input:focus{border-color:var(--accent);}
.inv-btn{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.invite-result{margin-top:12px;font-size:12px;font-family:monospace;color:var(--green);background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);padding:10px 14px;border-radius:6px;word-break:break-all;display:none;}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">ProposeAI Admin</div>
  <div id="hdr-user" style="font-size:12px;color:var(--ink3);"></div>
</div>

<div id="auth-gate" class="auth-gate">
  <input type="password" id="admin-key-input" placeholder="Admin Key" onkeydown="if(event.key==='Enter')checkKey()">
  <button onclick="checkKey()">Войти</button>
</div>

<div id="main" class="main">
  <div class="grid">
    <div class="stat"><div class="stat-n green" id="s-total">—</div><div class="stat-l">Всего пользователей</div></div>
    <div class="stat"><div class="stat-n" id="s-trial">—</div><div class="stat-l">На триале</div></div>
    <div class="stat"><div class="stat-n green" id="s-paid">—</div><div class="stat-l">Платящих</div></div>
    <div class="stat"><div class="stat-n" id="s-kp">—</div><div class="stat-l">КП за сегодня</div></div>
  </div>

  <div class="section-title">Создать инвайт</div>
  <div class="invite-form">
    <div class="invite-row">
      <input type="email" id="inv-email" placeholder="email бета-тестера">
      <select id="inv-plan">
        <option value="pro">Pro (30 дней)</option>
        <option value="starter">Starter (30 дней)</option>
        <option value="agency">Agency (30 дней)</option>
      </select>
      <input type="number" id="inv-days" value="30" min="7" max="90" style="max-width:80px;" placeholder="дней">
      <input type="text" id="inv-note" placeholder="Заметка (опц.)">
      <button class="inv-btn" onclick="createInvite()">Создать</button>
    </div>
    <div class="invite-result" id="invite-result"></div>
  </div>

  <div class="section-title">Последние пользователи</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Email</th><th>Тариф</th><th>КП всего</th><th>Зарегистрировался</th></tr></thead>
      <tbody id="users-tbody"><tr><td colspan="4" style="text-align:center;padding:20px;color:var(--ink3);">Загружаем…</td></tr></tbody>
    </table>
  </div>

  <div class="section-title">Последние платежи</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Email</th><th>Тариф</th><th>Сумма</th><th>Провайдер</th><th>Дата</th></tr></thead>
      <tbody id="payments-tbody"><tr><td colspan="5" style="text-align:center;padding:20px;color:var(--ink3);">Загружаем…</td></tr></tbody>
    </table>
  </div>
</div>

<script>
let ADMIN_KEY = ''

function checkKey() {
  ADMIN_KEY = document.getElementById('admin-key-input').value.trim()
  if (!ADMIN_KEY) return
  loadAdmin()
}

async function loadAdmin() {
  try {
    const r = await fetch('/api/admin', { headers: { 'X-Admin-Key': ADMIN_KEY } })
    if (r.status === 401) { alert('Неверный Admin Key'); return }
    const d = await r.json()

    document.getElementById('auth-gate').style.display = 'none'
    document.getElementById('main').style.display = 'block'
    document.getElementById('hdr-user').textContent = 'Authorized'

    document.getElementById('s-total').textContent = d.stats?.totalUsers ?? '—'
    document.getElementById('s-trial').textContent = d.stats?.trialUsers ?? '—'
    document.getElementById('s-paid').textContent = d.stats?.paidUsers ?? '—'
    document.getElementById('s-kp').textContent = d.stats?.proposalsToday ?? '—'

    const PLAN_COLORS = { trial:'trial', pro:'pro', free:'free', starter:'starter', agency:'pro' }
    document.getElementById('users-tbody').innerHTML = (d.users || []).map(u => `
      <tr>
        <td>${u.email}</td>
        <td><span class="badge ${PLAN_COLORS[u.plan] || 'free'}">${u.plan}</span></td>
        <td>${u.proposal_count ?? 0}</td>
        <td>${new Date(u.created_at).toLocaleDateString('ru-RU')}</td>
      </tr>`).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--ink3);">Пусто</td></tr>'

    document.getElementById('payments-tbody').innerHTML = (d.payments || []).map(p => `
      <tr>
        <td>${p.email || '—'}</td>
        <td><span class="badge ${PLAN_COLORS[p.plan] || 'free'}">${p.plan}</span></td>
        <td style="color:var(--green)">${p.amount ? (p.amount/100).toLocaleString('ru') + ' ' + (p.currency||'RUB').toUpperCase() : '—'}</td>
        <td>${p.provider}</td>
        <td>${new Date(p.paid_at || p.created_at).toLocaleDateString('ru-RU')}</td>
      </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--ink3);">Пусто</td></tr>'

  } catch (e) { alert('Ошибка: ' + e.message) }
}

async function createInvite() {
  const email = document.getElementById('inv-email').value.trim()
  if (!email) { alert('Введите email'); return }
  const r = await fetch('/api/invite', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY },
    body: JSON.stringify({
      email,
      plan: document.getElementById('inv-plan').value,
      days: parseInt(document.getElementById('inv-days').value) || 30,
      note: document.getElementById('inv-note').value,
    })
  })
  const d = await r.json()
  const el = document.getElementById('invite-result')
  el.style.display = 'block'
  if (r.ok) {
    el.textContent = `✓ Инвайт создан: ${d.inviteUrl}\nКод: ${d.code}\nОтправлен на: ${d.email}`
    document.getElementById('inv-email').value = ''
  } else {
    el.style.color = 'var(--red)'
    el.textContent = '✗ ' + d.error
  }
}
</script>
</body>
</html>
