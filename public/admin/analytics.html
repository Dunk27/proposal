<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — ProposeAI Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0F172A;--s:#1E293B;--b:rgba(255,255,255,.08);--ink:#F1F5F9;--ink2:#CBD5E1;--ink3:#64748B;--acc:#5584CC;--green:#34D399;--red:#F87171;--blue:#60A5FA;--purple:#A78BFA;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.hdr{padding:14px 28px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:16px;font-weight:600;color:var(--acc);}
.auth-gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 48px);gap:12px;}
.auth-gate input{background:var(--s);border:1px solid var(--b);border-radius:6px;padding:12px 16px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;width:280px;outline:none;}
.auth-gate input:focus{border-color:var(--acc);}
.auth-gate button{padding:11px 28px;background:var(--acc);color:#fff;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;width:280px;}
.main{display:none;padding:28px;}
.top-nav{display:flex;gap:10px;margin-bottom:24px;}
.nav-a{padding:8px 16px;border:1px solid var(--b);border-radius:6px;color:var(--ink3);font-size:12px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .2s;}
.nav-a:hover,.nav-a.act{background:var(--acc);border-color:var(--acc);color:#fff;}
.period-row{display:flex;gap:8px;margin-bottom:24px;}
.pb{padding:6px 14px;border:1px solid var(--b);border-radius:99px;color:var(--ink3);font-size:12px;cursor:pointer;transition:all .2s;}
.pb:hover,.pb.act{background:var(--acc);border-color:var(--acc);color:#fff;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:16px 18px;}
.stat-n{font-size:26px;font-weight:600;color:var(--ink);margin-bottom:3px;}
.stat-l{font-size:11px;color:var(--ink3);}
.stat-n.g{color:var(--green);}.stat-n.b{color:var(--blue);}.stat-n.a{color:var(--acc);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.panel{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:18px;}
.panel-t{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;}
.funnel{display:flex;flex-direction:column;gap:8px;}
.funnel-row{display:flex;align-items:center;gap:10px;}
.f-label{font-size:12px;color:var(--ink2);min-width:120px;}
.f-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.f-bar{height:100%;border-radius:3px;background:var(--acc);transition:width .5s;}
.f-val{font-size:11px;color:var(--acc);min-width:40px;text-align:right;}
.tpl-list{display:flex;flex-direction:column;gap:6px;}
.tpl-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;}
.tpl-name{color:var(--ink2);}
.tpl-cnt{color:var(--acc);font-weight:600;}
.loading{text-align:center;padding:40px;color:var(--ink3);font-size:13px;}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">ProposeAI Analytics</div>
  <div style="font-size:12px;color:var(--ink3);" id="hdr-period"></div>
</div>
<div id="auth-gate" class="auth-gate">
  <input type="password" id="admin-key-input" placeholder="Admin Key" onkeydown="if(event.key==='Enter')go()">
  <button onclick="go()">Войти</button>
</div>
<div id="main" class="main">
  <div class="top-nav">
    <a href="/admin" class="nav-a">Обзор</a>
    <a href="/admin/analytics" class="nav-a act">Аналитика</a>
  </div>
  <div class="period-row" id="period-row">
    <button class="pb" onclick="load(7)" data-d="7">7 дней</button>
    <button class="pb act" onclick="load(30)" data-d="30">30 дней</button>
    <button class="pb" onclick="load(90)" data-d="90">90 дней</button>
  </div>
  <div id="content"><div class="loading">Загружаем…</div></div>
</div>
<script>
let KEY = ''
function go() {
  KEY = document.getElementById('admin-key-input').value.trim()
  if (!KEY) return
  document.getElementById('auth-gate').style.display = 'none'
  document.getElementById('main').style.display = 'block'
  load(30)
}

async function load(days) {
  document.querySelectorAll('.pb').forEach(b => b.classList.toggle('act', +b.dataset.d === days))
  document.getElementById('hdr-period').textContent = `За ${days} дней`
  document.getElementById('content').innerHTML = '<div class="loading">Загружаем…</div>'
  try {
    const r = await fetch(`/api/analytics?period=${days}`, { headers: { 'X-Admin-Key': KEY } })
    if (r.status === 401) { alert('Неверный Admin Key'); return }
    const d = await r.json()
    render(d)
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="loading" style="color:var(--red)">Ошибка: ${e.message}</div>`
  }
}

function render(d) {
  const s = d.summary || {}
  const f = d.funnels || {}
  const t = d.topTemplates || []

  const maxKp = Math.max(s.kpGenerated || 1, 1)

  document.getElementById('content').innerHTML = `
<div class="grid">
  <div class="stat"><div class="stat-n b">${s.newUsers || 0}</div><div class="stat-l">Новых пользователей</div></div>
  <div class="stat"><div class="stat-n g">${s.kpGenerated || 0}</div><div class="stat-l">КП сгенерировано</div></div>
  <div class="stat"><div class="stat-n a">${s.upgradesPaid || 0}</div><div class="stat-l">Оплаченных апгрейдов</div></div>
  <div class="stat"><div class="stat-n">${(s.docxExports || 0) + (s.pdfExports || 0)}</div><div class="stat-l">Экспортов (DOCX+PDF)</div></div>
  <div class="stat"><div class="stat-n">${s.activeUsers || 0}</div><div class="stat-l">Активных пользователей</div></div>
  <div class="stat"><div class="stat-n">${s.pdfExports || 0}</div><div class="stat-l">PDF-экспортов</div></div>
  <div class="stat"><div class="stat-n">${s.referralsSent || 0}</div><div class="stat-l">Рефералов отправлено</div></div>
  <div class="stat"><div class="stat-n g">${f.activation || '—'}</div><div class="stat-l">Активация (рег→КП)</div></div>
</div>
<div class="two-col">
  <div class="panel">
    <div class="panel-t">Воронка конверсии</div>
    <div class="funnel">
      <div class="funnel-row"><span class="f-label">Зарегистрировались</span><div class="f-bar-wrap"><div class="f-bar" style="width:100%"></div></div><span class="f-val">${s.newUsers || 0}</span></div>
      <div class="funnel-row"><span class="f-label">Создали КП</span><div class="f-bar-wrap"><div class="f-bar" style="width:${s.newUsers ? Math.min(100, (s.activeUsers/s.newUsers*100)).toFixed(0) : 0}%"></div></div><span class="f-val">${s.activeUsers || 0}</span></div>
      <div class="funnel-row"><span class="f-label">Оплатили</span><div class="f-bar-wrap"><div class="f-bar" style="width:${s.newUsers ? Math.min(100, (s.upgradesPaid/s.newUsers*100)).toFixed(0) : 0}%"></div></div><span class="f-val">${s.upgradesPaid || 0}</span></div>
      <div class="funnel-row"><span class="f-label">Конверсия апгрейда</span><div class="f-bar-wrap"><div class="f-bar" style="background:var(--green);width:${parseFloat(f.upgradeConv || 0)}%"></div></div><span class="f-val">${f.upgradeConv || '—'}</span></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-t">Топ шаблонов</div>
    ${t.length === 0 ? '<div style="font-size:12px;color:var(--ink3)">Нет данных</div>' : `
    <div class="tpl-list">
      ${t.map(item => `
      <div class="tpl-row">
        <span class="tpl-name">${item.id}</span>
        <span class="tpl-cnt">${item.count} раз</span>
      </div>`).join('')}
    </div>`}
  </div>
</div>`
}
</script>
</body>
</html>
